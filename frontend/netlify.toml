# Netlify build configuration for the SahPravas frontend.
# If you connect the repo with "Base directory" = frontend, keep this file in frontend/.

[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so React Router deep links (e.g. /rides, /create) work on refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
